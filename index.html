<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel 3D</title>

    <link rel="stylesheet" href="./estilo.css">
</head>
<body>
    <h1>Carrosel 2D de Imagens</h1>
    <div class="carrossel-container">
        <button class="anterior">&#10094;</button>
        <div class="carrossel">
            <div class="slide">
                <a href="./Imagem1.jpg" target="_blank">
                    <img src="./Imagem1.jpg" alt="Imagem 1">
                </a>
                <div class="info">
                    <h2>Pedro</h2>
                    <p>Rei da FLoresta.</p>
                </div>
            </div>
            <div class="slide">
                <a href="./Imagem2.jpg" target="_blank">
                    <img src="./Imagem2.jpg" alt="Imagem 2">
                </a>
                <div class="info">
                    <h2>Julio</h2>
                    <p>Rainha da Floresta.</p>
                </div>
            </div>
            <div class="slide">
                <a href="./Imagem3.jpg" target="_blank">
                    <img src="./Imagem3.jpg" alt="Imagem 3">
                </a>
                <div class="info">
                    <h2>Casa de Campo</h2>
                    <p>Bom para descansar.</p>
                </div>
            </div>
            <div class="slide">
                <a href="./Imagem4.jpg" target="_blank">
                    <img src="./Imagem4.jpg" alt="Imagem 4">
                </a>
                <div class="info">
                    <h2>Peixe</h2>
                    <p>São lindos e vivem no mar.</p>
                </div>
            </div>
        </div>
        <button class="proximo">&#10095;</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
